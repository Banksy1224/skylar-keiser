<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b2545" />
  <meta name="description" content="Meet Skylar, the Keiser University AI assistant for prospective students." />
  <meta name="robots" content="noindex, nofollow" />
  <title>Skylar · Keiser University</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    html, body { overflow: hidden; overscroll-behavior: none; }
    body {
      font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f0eee9;
      color: #1a1d24;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    /* Use the dynamic viewport on mobile so the composer is never under the URL bar. */
    @supports (height: 100dvh) {
      html, body, #root { height: 100dvh; }
    }
    /* Prevent iOS Safari from zooming the page when focusing inputs. */
    input, textarea, select { font-size: 16px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Production fallback: shim window.claude to call our /api/complete proxy. -->
  <script>
    if (typeof window.claude === 'undefined' || typeof window.claude.complete !== 'function') {
      window.claude = {
        async complete(input) {
          const body = typeof input === 'string'
            ? { messages: [{ role: 'user', content: input }] }
            : input;
          const r = await fetch('/api/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({ error: r.statusText }));
            throw new Error(err.error || 'Request failed');
          }
          const data = await r.json();
          return data.text || '';
        },
      };
    }
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- FAQ corpus (English + Spanish) -->
  <script src="faqs.js"></script>
  <script src="faqs_es.js"></script>

  <!-- Only the components the production app needs (no Tweaks panel, no DesignCanvas, no browser chrome). -->
  <script type="text/babel" src="mascot.jsx"></script>
  <script type="text/babel" src="skylar-chat.jsx"></script>
  <script type="text/babel" src="skylar-chat-v2.jsx"></script>
  <script type="text/babel" src="skylar-app.jsx"></script>
</body>
</html>

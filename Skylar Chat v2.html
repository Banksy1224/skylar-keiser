<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skylar Chat · Branded for You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f0eee9;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Production fallback: if window.claude is not provided by the host
       (i.e. we're not running inside the in-platform preview), shim it to
       call our server-side proxy at /api/complete. -->
  <script>
    if (typeof window.claude === 'undefined' || typeof window.claude.complete !== 'function') {
      window.claude = {
        async complete(input) {
          const body = typeof input === 'string'
            ? { messages: [{ role: 'user', content: input }] }
            : input;
          const r = await fetch('/api/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({ error: r.statusText }));
            throw new Error(err.error || 'Request failed');
          }
          const data = await r.json();
          return data.text || '';
        },
      };
    }
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Image-slot web component (vanilla JS, NOT babel) -->
  <script src="image-slot.js"></script>

  <!-- Placeholder FAQ data -->
  <script src="faqs.js"></script>

  <!-- Shared components -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="browser-window.jsx"></script>
  <script type="text/babel" src="mascot.jsx"></script>
  <script type="text/babel" src="skylar-chat.jsx"></script>
  <script type="text/babel" src="skylar-chat-v2.jsx"></script>
  <script type="text/babel" src="variations-v2.jsx"></script>
  <script type="text/babel" src="app-v2.jsx"></script>
</body>
</html>
